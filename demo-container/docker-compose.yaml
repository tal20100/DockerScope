version: "3.9"
services:
  test-container:
    build: .
    container_name: test-container
    privileged: true
    network_mode: "host"   # Simulate host network
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host_root    # simulate dangerous mount